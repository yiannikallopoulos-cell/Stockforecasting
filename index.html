<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sharp Money — Stock Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:       #0D1117;
    --paper:     #F5F0E8;
    --cream:     #EDE8DC;
    --rule:      #D4C9B0;
    --gold:      #B8943A;
    --gold-lt:   #E8D48A;
    --muted:     #6B6352;
    --strong-buy:  #1a6b2e;
    --buy:         #2d9e52;
    --hold:        #8a6d10;
    --sell:        #c45e1a;
    --strong-sell: #a81e1e;
    --strong-buy-bg:  #e8f5ec;
    --buy-bg:         #edf7f1;
    --hold-bg:        #fdf6e3;
    --sell-bg:        #fef0e6;
    --strong-sell-bg: #fce8e8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── Masthead ── */
  .masthead {
    border-bottom: 3px double var(--ink);
    padding: 18px 48px 14px;
    display: flex;
    align-items: baseline;
    gap: 20px;
    background: var(--paper);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .masthead-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    letter-spacing: -0.5px;
    color: var(--ink);
  }
  .masthead-logo span { color: var(--gold); }
  .masthead-tagline {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-left: 1px solid var(--rule);
    padding-left: 20px;
  }

  /* ── Hero search ── */
  .hero {
    max-width: 760px;
    margin: 64px auto 0;
    padding: 0 24px;
    text-align: center;
  }
  .hero-headline {
    font-family: 'DM Serif Display', serif;
    font-size: 52px;
    line-height: 1.1;
    letter-spacing: -1.5px;
    margin-bottom: 12px;
  }
  .hero-headline em {
    font-style: italic;
    color: var(--gold);
  }
  .hero-sub {
    color: var(--muted);
    font-size: 16px;
    margin-bottom: 40px;
    font-weight: 300;
  }

  /* ── Search form ── */
  .search-form {
    display: flex;
    gap: 0;
    max-width: 520px;
    margin: 0 auto;
    border: 2px solid var(--ink);
    background: #fff;
    box-shadow: 6px 6px 0 var(--ink);
  }
  .search-form input {
    flex: 1;
    padding: 16px 20px;
    font-size: 18px;
    font-family: 'DM Serif Display', serif;
    border: none;
    outline: none;
    background: transparent;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .search-form input::placeholder {
    color: #ccc;
    font-style: italic;
    letter-spacing: 1px;
    text-transform: none;
  }
  .year-select {
    border: none;
    border-left: 2px solid var(--ink);
    padding: 16px 14px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    cursor: pointer;
    outline: none;
    font-weight: 500;
  }
  .search-btn {
    padding: 16px 28px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .search-btn:hover { background: #2a3441; }
  .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Loading state ── */
  .loading-bar {
    display: none;
    max-width: 520px;
    margin: 16px auto 0;
    height: 3px;
    background: var(--cream);
    border: 1px solid var(--rule);
    overflow: hidden;
  }
  .loading-bar.active { display: block; }
  .loading-progress {
    height: 100%;
    background: var(--gold);
    width: 0%;
    transition: width 0.4s ease;
  }
  .loading-msg {
    display: none;
    text-align: center;
    margin-top: 10px;
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
  }
  .loading-msg.active { display: block; }

  /* ── Error ── */
  .error-box {
    display: none;
    max-width: 520px;
    margin: 16px auto 0;
    padding: 14px 18px;
    background: #fff0f0;
    border: 1px solid #e08080;
    font-size: 13px;
    color: #8b0000;
  }
  .error-box.active { display: block; }

  /* ── Results ── */
  #results {
    display: none;
    max-width: 1100px;
    margin: 48px auto 80px;
    padding: 0 24px;
  }
  #results.active { display: block; }

  /* ── Section rule ── */
  .section-rule {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 36px 0 20px;
  }
  .section-rule-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }
  .section-rule-line {
    flex: 1;
    height: 1px;
    background: var(--rule);
  }

  /* ── Company header card ── */
  .company-header {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 24px;
    padding: 28px 32px;
    background: white;
    border: 2px solid var(--ink);
    box-shadow: 5px 5px 0 var(--rule);
    margin-bottom: 24px;
  }
  .company-name {
    font-family: 'DM Serif Display', serif;
    font-size: 34px;
    letter-spacing: -1px;
    line-height: 1;
  }
  .company-meta {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .company-desc {
    margin-top: 12px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    max-width: 640px;
  }
  .price-display {
    text-align: right;
  }
  .price-current {
    font-family: 'DM Serif Display', serif;
    font-size: 42px;
    color: var(--ink);
    line-height: 1;
  }
  .price-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 4px;
  }
  .price-range {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
  }

  /* ── Rating card ── */
  .rating-card {
    padding: 36px 40px;
    border: 3px solid var(--ink);
    box-shadow: 8px 8px 0 var(--ink);
    position: relative;
    overflow: hidden;
    margin-bottom: 24px;
  }
  .rating-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
  }
  .rating-stamp {
    display: inline-flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
  }
  .rating-badge {
    font-family: 'DM Serif Display', serif;
    font-size: 36px;
    letter-spacing: -0.5px;
    padding: 8px 24px;
    border: 3px solid currentColor;
    line-height: 1;
  }
  .rating-stars {
    font-size: 22px;
    letter-spacing: 4px;
  }
  .rating-desc {
    font-size: 14px;
    font-style: italic;
    color: var(--muted);
    margin-bottom: 24px;
  }
  .dcf-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--rule);
    border: 1px solid var(--rule);
    margin-top: 20px;
  }
  .dcf-cell {
    background: white;
    padding: 18px 20px;
  }
  .dcf-cell-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .dcf-cell-value {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    line-height: 1;
  }
  .dcf-cell-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }
  .upside-positive { color: var(--strong-buy); }
  .upside-negative { color: var(--strong-sell); }
  .upside-neutral  { color: var(--hold); }

  /* ── Gauge visual ── */
  .gauge-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 20px;
    padding: 16px 20px;
    background: var(--cream);
    border: 1px solid var(--rule);
  }
  .gauge-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; white-space: nowrap; }
  .gauge-track {
    flex: 1;
    height: 12px;
    background: linear-gradient(to right, #a81e1e 0%, #c45e1a 25%, #8a6d10 45%, #8a6d10 55%, #2d9e52 75%, #1a6b2e 100%);
    border-radius: 2px;
    position: relative;
  }
  .gauge-needle {
    position: absolute;
    top: -4px;
    width: 4px;
    height: 20px;
    background: var(--ink);
    border-radius: 2px;
    transform: translateX(-50%);
    transition: left 1s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .gauge-pct { font-size: 13px; font-weight: 600; white-space: nowrap; }

  /* ── Metrics grid ── */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--rule);
    border: 1px solid var(--rule);
    margin-bottom: 24px;
  }
  .metric-cell {
    background: white;
    padding: 16px 20px;
  }
  .metric-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 5px;
    font-weight: 500;
  }
  .metric-value {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
  }

  /* ── FCF schedule table ── */
  .fcf-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin-bottom: 24px;
  }
  .fcf-table th {
    text-align: right;
    padding: 8px 14px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 2px solid var(--ink);
    background: var(--cream);
  }
  .fcf-table th:first-child { text-align: left; }
  .fcf-table td {
    text-align: right;
    padding: 10px 14px;
    border-bottom: 1px solid var(--rule);
    font-variant-numeric: tabular-nums;
  }
  .fcf-table td:first-child { text-align: left; font-weight: 500; }
  .fcf-table tr:last-child td { border-bottom: none; font-weight: 600; background: var(--cream); }

  /* ── Peers table ── */
  .peers-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .peers-table th {
    text-align: right;
    padding: 8px 14px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 2px solid var(--ink);
    background: var(--cream);
  }
  .peers-table th:first-child { text-align: left; }
  .peers-table td {
    text-align: right;
    padding: 10px 14px;
    border-bottom: 1px solid var(--rule);
    font-variant-numeric: tabular-nums;
  }
  .peers-table td:first-child { text-align: left; font-weight: 600; }
  .peers-table tr.subject td { background: var(--cream); font-weight: 700; }
  .peers-table tr:last-child td { border-bottom: none; }

  /* ── Download strip ── */
  .download-strip {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 22px 32px;
    background: var(--ink);
    color: var(--paper);
    border: 2px solid var(--ink);
    margin-bottom: 24px;
  }
  .download-strip-text h3 {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    margin-bottom: 3px;
  }
  .download-strip-text p {
    font-size: 12px;
    color: #aaa;
  }
  .download-btn {
    margin-left: auto;
    padding: 13px 28px;
    background: var(--gold);
    color: var(--ink);
    border: none;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .download-btn:hover { background: var(--gold-lt); }

  /* ── Revenue chart ── */
  .chart-wrap {
    background: white;
    border: 1px solid var(--rule);
    padding: 28px 24px 20px;
    margin-bottom: 24px;
  }
  .chart-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .bar-chart {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    height: 240px;          /* 2× taller — much more readable */
    padding: 8px 0 0;
  }
  .bar-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    height: 100%;
  }
  .bar-track {
    flex: 1;
    display: flex;
    align-items: flex-end;
    width: 100%;
    position: relative;
  }
  .bar {
    width: 100%;
    transition: height 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
    min-height: 6px;
    border-radius: 3px 3px 0 0;
  }
  .bar.hist { background: var(--ink); }
  .bar.proj { background: var(--gold); }
  .bar-label {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    white-space: nowrap;
    font-weight: 500;
  }
  .bar-val {
    font-size: 11px;
    font-weight: 700;
    text-align: center;
    white-space: nowrap;
  }
  /* Divider between historical and projected bars */
  .bar-group.proj-first {
    border-left: 2px dashed var(--rule);
    padding-left: 4px;
  }

  /* ── Analyst strip ── */
  .analyst-strip {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 16px 24px;
    background: var(--cream);
    border: 1px solid var(--rule);
    margin-bottom: 24px;
    font-size: 13px;
  }
  .analyst-rec {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    font-weight: bold;
  }
  .analyst-divider { width: 1px; height: 32px; background: var(--rule); }

  /* ── Responsive ── */
  @media (max-width: 720px) {
    .hero-headline { font-size: 36px; }
    .dcf-grid { grid-template-columns: repeat(2, 1fr); }
    .metrics-grid { grid-template-columns: repeat(2, 1fr); }
    .company-header { grid-template-columns: 1fr; }
    .masthead { padding: 14px 20px; }
  }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeUp 0.5s ease forwards; }
  .fade-in-delay-1 { animation: fadeUp 0.5s 0.1s ease both; }
  .fade-in-delay-2 { animation: fadeUp 0.5s 0.2s ease both; }
  .fade-in-delay-3 { animation: fadeUp 0.5s 0.3s ease both; }
  .fade-in-delay-4 { animation: fadeUp 0.5s 0.4s ease both; }
  .fade-in-delay-5 { animation: fadeUp 0.5s 0.5s ease both; }
</style>
</head>
<body>

<header class="masthead">
  <div class="masthead-logo">Sharp<span>Money</span></div>
  <div class="masthead-tagline">Institutional-Grade Stock Analysis</div>
</header>

<main>
  <section class="hero">
    <h1 class="hero-headline">Find where<br><em>sharp money goes.</em></h1>
    <p class="hero-sub">Enter any ticker for a professional DCF model, Bull/Base/Bear scenarios, and institutional-grade Excel output.</p>

    <div class="search-form">
      <input type="text" id="ticker-input" placeholder="e.g. META, AAPL, NVDA" maxlength="10" autocomplete="off">
      <select class="year-select" id="years-select">
        <option value="3">3 Yr</option>
        <option value="4">4 Yr</option>
        <option value="5" selected>5 Yr</option>
      </select>
      <button class="search-btn" id="search-btn" onclick="runAnalysis()">Analyze ↗</button>
    </div>

    <div class="loading-bar" id="loading-bar"><div class="loading-progress" id="loading-progress"></div></div>
    <div class="loading-msg" id="loading-msg">Fetching financials from Yahoo Finance & SEC EDGAR…</div>
    <div class="error-box" id="error-box"></div>
  </section>

  <section id="results">
    <!-- Injected by JS -->
  </section>
</main>

<script>
let currentFilename = null;

const LOAD_MESSAGES = [
  "Fetching financials from Yahoo Finance & SEC EDGAR…",
  "Pulling income statement, balance sheet & cash flow…",
  "Fetching peer comparison data…",
  "Building DCF model and projections…",
  "Generating Excel workbook…",
  "Almost done…",
];

function fmt(n, decimals=1, prefix='', suffix='') {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return prefix + n.toFixed(decimals) + suffix;
}

function fmtPct(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  const sign = n >= 0 ? '+' : '';
  return sign + n.toFixed(1) + '%';
}

function ratingStyles(rating) {
  const map = {
    'STRONG BUY':  { color: 'var(--strong-buy)',  bg: 'var(--strong-buy-bg)',  stars: '★★★★★' },
    'BUY':         { color: 'var(--buy)',          bg: 'var(--buy-bg)',         stars: '★★★★☆' },
    'HOLD':        { color: 'var(--hold)',          bg: 'var(--hold-bg)',        stars: '★★★☆☆' },
    'SELL':        { color: 'var(--sell)',          bg: 'var(--sell-bg)',        stars: '★★☆☆☆' },
    'STRONG SELL': { color: 'var(--strong-sell)',  bg: 'var(--strong-sell-bg)', stars: '★☆☆☆☆' },
  };
  return map[rating] || { color: '#555', bg: '#f5f5f5', stars: '★★★☆☆' };
}

function gaugePosition(upsidePct) {
  // Map upside% to gauge position 0-100
  // -40% → 0, 0% → 50, +40% → 100
  const clamped = Math.max(-40, Math.min(40, upsidePct));
  return ((clamped + 40) / 80) * 100;
}

function buildBarChart(histYears, histRevenue, projGrowth) {
  const lastRev = histRevenue[histRevenue.length - 1] || 1;

  // Build full projected revenue list first
  const projRevs = [];
  let curRev = lastRev;
  projGrowth.forEach(g => {
    curRev = curRev * (1 + g / 100);
    projRevs.push(curRev);
  });

  // Single unified max across ALL bars so growth is visually accurate
  const allVals = [...histRevenue, ...projRevs];
  const maxRev  = Math.max(...allVals) * 1.08;  // 8% headroom so tallest bar isn't flush to top

  let bars = '';

  // Historical bars
  histYears.forEach((yr, i) => {
    const v = histRevenue[i] || 0;
    const h = Math.max(4, Math.round((v / maxRev) * 100));
    bars += `<div class="bar-group">
      <div class="bar-val">${fmt(v, 1, '$', 'B')}</div>
      <div class="bar-track"><div class="bar hist" style="height:${h}%"></div></div>
      <div class="bar-label">${yr}</div>
    </div>`;
  });

  // Projected bars — first one gets a dashed left border to show boundary
  projRevs.forEach((v, i) => {
    const h   = Math.max(4, Math.round((v / maxRev) * 100));
    const yr  = parseInt(histYears[histYears.length - 1]) + i + 1;
    const cls = i === 0 ? 'bar-group proj-first' : 'bar-group';
    const chg = i === 0
      ? fmtPct(((v / lastRev) - 1) * 100 / projGrowth.length)
      : fmtPct(projGrowth[i]);
    bars += `<div class="${cls}">
      <div class="bar-val" style="color:var(--gold)">${fmt(v, 1, '$', 'B')}</div>
      <div class="bar-track"><div class="bar proj" style="height:${h}%"></div></div>
      <div class="bar-label" style="color:var(--gold)">${yr}E</div>
      <div class="bar-label" style="color:var(--gold);font-style:italic">${chg}</div>
    </div>`;
  });

  return bars;
}

function buildSensitivityTable(dcf) {
  if (!dcf.sensitivity_prices || !dcf.sensitivity_coe || !dcf.sensitivity_g) return "";
  const prices = dcf.sensitivity_prices;
  const coes   = dcf.sensitivity_coe;
  const gs     = dcf.sensitivity_g;
  const curPx  = dcf.current_price;
  const basePx = dcf.dcf_price;

  let headerCells = `<th style="text-align:left;background:var(--cream)">CoE \ Terminal g</th>`;
  gs.forEach(g => headerCells += `<th>${g}%</th>`);

  let bodyRows = "";
  prices.forEach((row, ri) => {
    const isBaseCoe = Math.abs(coes[ri] - dcf.coe_pct) < 0.15;
    bodyRows += `<tr style="${isBaseCoe?'background:var(--cream);font-weight:600':''}">`;
    bodyRows += `<td style="text-align:left;font-weight:600">${coes[ri]}%</td>`;
    row.forEach((px, ci) => {
      if (px === null) { bodyRows += `<td>—</td>`; return; }
      const up = curPx ? ((px/curPx)-1)*100 : 0;
      const isBase = isBaseCoe && Math.abs(gs[ci]-dcf.terminal_growth_pct)<0.15;
      let bg = "";
      if (up >= 30) bg = "background:#e8f5ec";
      else if (up >= 10) bg = "background:#f0faf3";
      else if (up >= -10) bg = "background:#fdf8e8";
      else if (up >= -25) bg = "background:#fef0e6";
      else bg = "background:#fce8e8";
      bodyRows += `<td style="${bg}${isBase?';border:2px solid var(--ink)':''}">$${px.toFixed(0)}<br><span style="font-size:9px;color:#666">${up>=0?'+':''}${up.toFixed(0)}%</span></td>`;
    });
    bodyRows += `</tr>`;
  });

  return `
  <div class="section-rule fade-in-delay-4">
    <span class="section-rule-label">Sensitivity Analysis — DCF Price by CoE &amp; Terminal Growth</span>
    <div class="section-rule-line"></div>
    <span class="section-rule-label" style="color:var(--gold)">■ Base case outlined</span>
  </div>
  <div style="overflow-x:auto;margin-bottom:24px" class="fade-in-delay-4">
    <table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead><tr>${headerCells}</tr></thead>
      <tbody>${bodyRows}</tbody>
    </table>
    <div style="font-size:10px;color:var(--muted);margin-top:6px;font-style:italic">
      Green = upside ≥30% · Light green = 10–30% · Yellow = ±10% · Orange = -10–25% · Red = &gt;25% downside
    </div>
  </div>`;
}

function buildFCFTable(fcfSchedule, ticker) {
  const rows = fcfSchedule.map(row => `
    <tr>
      <td>Year ${row.year}</td>
      <td>${row.revenue !== undefined ? fmt(row.revenue, 1, '$', 'mm') : '—'}</td>
      <td>${row.op_margin !== undefined ? fmt(row.op_margin, 1, '', '%') : '—'}</td>
      <td>${fmt(row.fcf, 0, '$', 'mm')}</td>
      <td>${fmt(row.pv, 0, '$', 'mm')}</td>
    </tr>`).join('');
  return `<table class="fcf-table">
    <thead>
      <tr>
        <th style="text-align:left">Period</th>
        <th>Revenue ($mm)</th>
        <th>Op Margin</th>
        <th>FCF ($mm)</th>
        <th>PV of FCF ($mm)</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function buildPeersTable(subjectTicker, summary, peers) {
  const subjRow = `<tr class="subject">
    <td>${subjectTicker}</td>
    <td>${fmt(summary.price, 2, '$')}</td>
    <td>${summary.pe_forward > 0 ? fmt(summary.pe_forward, 1, '', 'x') : '—'}</td>
    <td>${summary.ev_ebitda > 0 ? fmt(summary.ev_ebitda, 1, '', 'x') : '—'}</td>
    <td>${fmt(summary.gross_margin, 1, '', '%')}</td>
    <td>${fmt(summary.op_margin, 1, '', '%')}</td>
    <td>${fmt(summary.rev_cagr, 1, '', '%')} (3yr)</td>
  </tr>`;
  const peerRows = Object.entries(peers).map(([t, p]) => `<tr>
    <td>${t}</td>
    <td>${fmt(p.price, 2, '$')}</td>
    <td>${p.pe_forward > 0 ? fmt(p.pe_forward, 1, '', 'x') : '—'}</td>
    <td>${p.ev_ebitda > 0 ? fmt(p.ev_ebitda, 1, '', 'x') : '—'}</td>
    <td>${fmt(p.gross_margin, 1, '', '%')}</td>
    <td>${fmt(p.op_margin, 1, '', '%')}</td>
    <td>${fmt(p.revenue_growth, 1, '', '%')}</td>
  </tr>`).join('');

  return `<table class="peers-table">
    <thead>
      <tr>
        <th style="text-align:left">Ticker</th>
        <th>Price</th>
        <th>P/E Fwd</th>
        <th>EV/EBITDA</th>
        <th>Gross Mgn</th>
        <th>Op. Mgn</th>
        <th>Rev Growth</th>
      </tr>
    </thead>
    <tbody>${subjRow}${peerRows}</tbody>
  </table>`;
}

function fmtTrend(val) {
  // val is a decimal like 0.023 meaning +2.3pp/yr
  if (val === null || val === undefined || isNaN(val)) return 'N/A';
  const pp = val * 100;
  const sign = pp >= 0 ? '+' : '';
  return sign + pp.toFixed(2) + ' pp/yr';
}

function buildModelSignalCard(label, value, unit, trendVal, subtext) {
  // trendVal: if provided, color the value green/red based on sign
  let color = 'var(--ink)';
  let bg = 'white';
  let indicator = '';
  if (trendVal !== null && trendVal !== undefined && !isNaN(trendVal)) {
    if (trendVal > 0.005) {
      color = '#1a6b2e'; bg = '#f0faf3';
      indicator = '<span style="font-size:18px;margin-right:4px">▲</span>';
    } else if (trendVal < -0.005) {
      color = '#a81e1e'; bg = '#fdf0f0';
      indicator = '<span style="font-size:18px;margin-right:4px">▼</span>';
    } else {
      color = '#8a6d10'; bg = '#fdf8e8';
      indicator = '<span style="font-size:18px;margin-right:4px">→</span>';
    }
  }
  return `<div style="background:${bg};padding:14px 16px">
    <div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:4px">${label}</div>
    <div style="font-size:15px;font-weight:600;color:${color};text-transform:capitalize">${indicator}${value}${unit}</div>
    <div style="font-size:10px;color:var(--muted);margin-top:3px">${subtext}</div>
  </div>`;
}

function signalColor(signal) {
  const map = {
    bullish:'#1a6b2e', slightly_bullish:'#2d9e52',
    bearish:'#a81e1e', slightly_bearish:'#c45e1a',
    neutral:'#8a6d10',
    high_short:'#a81e1e', elevated_short:'#c45e1a',
    moderate_short:'#8a6d10', low_short:'#2d9e52',
    very_high_iv:'#a81e1e', high_iv:'#c45e1a',
    normal_iv:'#8a6d10', low_iv:'#2d9e52',
  };
  return map[signal] || '#595959';
}

function signalBg(signal) {
  const map = {
    bullish:'#e8f5ec', slightly_bullish:'#edf7f1',
    bearish:'#fce8e8', slightly_bearish:'#fef0e6',
    neutral:'#fdf6e3',
    high_short:'#fce8e8', elevated_short:'#fef0e6',
    moderate_short:'#fdf6e3', low_short:'#edf7f1',
    very_high_iv:'#fce8e8', high_iv:'#fef0e6',
    normal_iv:'#fdf6e3', low_iv:'#edf7f1',
  };
  return map[signal] || '#f5f5f5';
}

function buildInsiderCard(summary) {
  const sig   = summary.insider_signal || 'neutral';
  const desc  = summary.insider_signal_desc || 'No data';
  const buys  = summary.insider_buy_count || 0;
  const sells = summary.insider_sell_count || 0;
  const txns  = summary.insider_transactions || [];
  const color = signalColor(sig); const bg = signalBg(sig);

  let txnRows = '';
  txns.slice(0,3).forEach(t => {
    const typeColor = t.type === 'BUY' ? '#1a6b2e' : '#a81e1e';
    txnRows += `<div style="display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid var(--rule)">
      <span style="color:${typeColor};font-weight:600">${t.type}</span>
      <span style="color:var(--muted)">${t.name?.substring(0,18)}</span>
      <span>${t.shares?.toLocaleString()}</span>
    </div>`;
  });

  return `<div style="background:${bg};border:1px solid var(--rule);padding:18px 20px">
    <div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:${color};font-weight:600;margin-bottom:8px">Insider Activity</div>
    <div style="font-family:DM Serif Display,serif;font-size:20px;color:${color};margin-bottom:6px">${sig.replace(/_/g,' ').toUpperCase()}</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:10px">${desc}</div>
    <div style="font-size:11px;margin-bottom:8px"><span style="color:#1a6b2e;font-weight:600">${buys} buys</span> &nbsp;·&nbsp; <span style="color:#a81e1e;font-weight:600">${sells} sells</span> (last 6mo)</div>
    ${txnRows ? `<div style="margin-top:8px">${txnRows}</div>` : ''}
  </div>`;
}

function buildShortInterestCard(summary) {
  const sig   = summary.short_signal || 'neutral';
  const desc  = summary.short_signal_desc || 'No data';
  const pct   = summary.short_pct_float || 0;
  const days  = summary.short_ratio || 0;
  const color = signalColor(sig); const bg = signalBg(sig);

  // Mini bar showing short % vs 100%
  const barW  = Math.min(pct, 40) / 40 * 100;
  const barColor = pct > 20 ? '#a81e1e' : pct > 10 ? '#c45e1a' : pct > 5 ? '#8a6d10' : '#2d9e52';

  return `<div style="background:${bg};border:1px solid var(--rule);padding:18px 20px">
    <div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:${color};font-weight:600;margin-bottom:8px">Short Interest</div>
    <div style="font-family:DM Serif Display,serif;font-size:32px;color:${color};line-height:1">${pct > 0 ? pct.toFixed(1)+'%' : '—'}</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:10px">of float is short</div>
    ${pct > 0 ? `<div style="height:6px;background:var(--rule);border-radius:3px;margin-bottom:8px">
      <div style="height:100%;width:${barW}%;background:${barColor};border-radius:3px"></div>
    </div>` : ''}
    <div style="font-size:11px;color:var(--muted)">${days > 0 ? days.toFixed(1)+' days to cover' : ''}</div>
    <div style="font-size:11px;color:${color};margin-top:6px;font-style:italic">${desc.substring(0,100)}</div>
  </div>`;
}

function buildIVCard(summary) {
  const sig  = summary.iv_signal || 'neutral';
  const desc = summary.iv_signal_desc || 'No data';
  const iv   = summary.iv_30d || 0;
  const pc   = summary.put_call_ratio || 0;
  const color= signalColor(sig); const bg = signalBg(sig);

  return `<div style="background:${bg};border:1px solid var(--rule);padding:18px 20px">
    <div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:${color};font-weight:600;margin-bottom:8px">Options Implied Volatility</div>
    <div style="font-family:DM Serif Display,serif;font-size:32px;color:${color};line-height:1">${iv > 0 ? iv.toFixed(0)+'%' : '—'}</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:10px">30-day ATM implied vol</div>
    ${pc > 0 ? `<div style="font-size:13px;font-weight:600;margin-bottom:6px">P/C Ratio: ${pc.toFixed(2)} <span style="font-size:10px;font-weight:400;color:var(--muted)">${pc > 1.2 ? '(bearish skew)' : pc < 0.8 ? '(bullish skew)' : '(neutral)'}</span></div>` : ''}
    <div style="font-size:11px;color:${color};font-style:italic">${desc.substring(0,120)}</div>
  </div>`;
}

function buildQuarterlySection(summary) {
  const qrev = summary.quarterly_revenue || {};
  const qgm  = summary.quarterly_gross_margin || {};
  const qom  = summary.quarterly_op_margin || {};
  const accel = summary.recent_rev_accel;

  const qKeys = Object.keys(qrev).sort().slice(-8);  // up to 8 quarters = 2 years
  if (qKeys.length < 2) return '';

  // Unified max with headroom
  const allVals = qKeys.map(k => qrev[k] || 0);
  const maxRev  = Math.max(...allVals) * 1.08;

  let bars = '';
  qKeys.forEach((k, i) => {
    const rv  = qrev[k] || 0;
    const gm  = qgm[k];
    const om  = qom[k];
    const h   = maxRev > 0 ? Math.max(4, Math.round((rv / maxRev) * 100)) : 4;

    // Compute QoQ vs same quarter last year (4 quarters ago)
    let yoyPct = null;
    if (i >= 4) {
      const prevK = qKeys[i - 4];
      const prevV = qrev[prevK];
      if (prevV && prevV > 0) yoyPct = ((rv - prevV) / prevV) * 100;
    }

    // Label: use last 5 chars of key for quarter label (e.g. "2024-" → "24-Q3")
    const label = k.length >= 7 ? k.substring(2, 7) : k;

    bars += `<div class="bar-group">
      <div class="bar-val" style="font-size:10px">${fmt(rv, 1, '$', 'B')}</div>
      <div class="bar-track"><div class="bar hist" style="height:${h}%"></div></div>
      <div class="bar-label">${label}</div>
      ${gm !== undefined
        ? `<div class="bar-label" style="color:var(--gold);font-weight:600">${fmt(gm, 1, '', '%')}</div>`
        : ''}
      ${yoyPct !== null
        ? `<div class="bar-label" style="color:${yoyPct >= 0 ? '#1a6b2e' : '#a81e1e'};font-size:9px">${yoyPct >= 0 ? '+' : ''}${yoyPct.toFixed(1)}% YoY</div>`
        : ''}
    </div>`;
  });

  const accelText = (accel !== 0 && accel !== null && accel !== undefined)
    ? `<span style="font-size:11px;padding:3px 10px;background:${accel > 0 ? '#e8f5ec' : '#fce8e8'};color:${accel > 0 ? '#1a6b2e' : '#a81e1e'};font-weight:600;margin-left:12px">${accel > 0 ? '▲ Accelerating' : '▼ Decelerating'} ${Math.abs(accel * 100).toFixed(1)}pp QoQ</span>`
    : '';

  return `
  <div class="section-rule fade-in-delay-4">
    <span class="section-rule-label">Quarterly Revenue Trend (Last 8 Quarters)${accelText}</span>
    <div class="section-rule-line"></div>
    <span class="section-rule-label" style="color:var(--gold)">■ Gold % = Gross Margin</span>
  </div>
  <div class="chart-wrap fade-in-delay-4" style="padding:28px 24px 20px;">
    <div class="bar-chart">${bars}</div>
    <div style="margin-top:12px;font-size:10px;color:var(--muted);font-style:italic">
      Green/red % = Year-over-year revenue growth per quarter · Gold % = Gross margin
    </div>
  </div>`;
}

async function runAnalysis() {
  const ticker = document.getElementById('ticker-input').value.trim().toUpperCase();
  const years  = parseInt(document.getElementById('years-select').value);

  if (!ticker) {
    document.getElementById('error-box').textContent = 'Please enter a ticker symbol.';
    document.getElementById('error-box').classList.add('active');
    return;
  }

  // Reset UI
  document.getElementById('error-box').classList.remove('active');
  document.getElementById('results').classList.remove('active');
  document.getElementById('results').innerHTML = '';
  const btn = document.getElementById('search-btn');
  btn.disabled = true;
  btn.textContent = 'Analyzing…';

  // Loading bar
  const bar = document.getElementById('loading-bar');
  const progress = document.getElementById('loading-progress');
  const msg = document.getElementById('loading-msg');
  bar.classList.add('active');
  msg.classList.add('active');

  // Animate progress while waiting
  let pct = 0;
  let msgIdx = 0;
  const interval = setInterval(() => {
    pct = Math.min(pct + (pct < 60 ? 4 : pct < 85 ? 1.5 : 0.5), 92);
    progress.style.width = pct + '%';
    if (msgIdx < LOAD_MESSAGES.length - 1 && pct > (msgIdx + 1) * 14) {
      msgIdx++;
      msg.textContent = LOAD_MESSAGES[msgIdx];
    }
  }, 500);

  try {
    const resp = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ticker, years }),
    });
    const data = await resp.json();

    clearInterval(interval);
    progress.style.width = '100%';
    setTimeout(() => { bar.classList.remove('active'); msg.classList.remove('active'); }, 400);

    if (!resp.ok || data.error) {
      throw new Error(data.error || `Server error ${resp.status}`);
    }

    renderResults(data);
  } catch (err) {
    clearInterval(interval);
    bar.classList.remove('active');
    msg.classList.remove('active');
    document.getElementById('error-box').textContent = `Error: ${err.message}`;
    document.getElementById('error-box').classList.add('active');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Analyze ↗';
    progress.style.width = '0%';
  }
}

// Enter key support
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('ticker-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') runAnalysis();
  });
});
</script>
